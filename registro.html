                <h2>
                    Formulario de contacto

                <!--- SIMPLE INPUT  --->

                <fieldset>
                    <legend>INFORMACION BASICA</legend>
                    <div class="form_input">
                        <label>NOMBRE
                            <input type="text" placeholder="jhon" id="nombre">
                        </label>
                    </div>

                    <div class="form_input">
                        <label>APELLIDOS
                            <input type="text" placeholder="connor owen">
                        </label>
                    </div>

                    <div class="form_input">
                        <label>CORREO ELECTRONICO
                            <input type="Email" placeholder="eldalto@gmail.com">
                        </label>
                    </div>

                    <!---  TEXTAREA--->
                    <div class="form_input">
                        <label>MENSAJE
                            <textarea rows="6" placeholder="Deja tu mensaje....."></textarea>
                        </label>
                    </div>
                </fieldset>

                <!---  SELECT  Y OPTION --->

                <fieldset>
                    <legend>INFORMACION DE USUARIOS</legend>
                    <div class="form_input">
                        <label>TIPO DE USUARIOS
                            <select name="type-of-user">
                                <option value="user1"> cliente</option>
                                <option value="user2"> prooveedor</option>
                                <option value="user3"> inspector</option>
                                <option value="user4"> aspirante</option>
                            </select>
                        </label>
                    </div>

                    <!---  DATALIST Y OPTION --->
                    <div class="form_input">
                        <label>REFERENTE
                            <input list="referente" name="referente">
                            <datalist id="referente" name=" type-of-user">
                                <option value="camilo perez">un posible cliente </option>
                                <option value="un distribuidor"> sofware y computo sa</option>
                                <option value="inspector">andres martinez</option>
                                <option value="planeador"> sergio lopez</option>
                                </select>
                        </label>
                    </div>


                    <div class="form_input">
                        <label>FECHA
                            <input type="date" placeholder="fecha de nacimiento">
                        </label>
                    </div>

                    <div class="form_input">
                        <label>ACEPTO LOS TERMINOS Y CONDICIONES
                            <input class="checkbox" type="checkbox">
                        </label>
                    </div>




                    </div>
                    <div class="form_input">
                        <input class="enviar" type="submit">
                    </div>
